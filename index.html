    <script>
        const menuButton = document.querySelector('.btn_menu');
        const profileMenu = document.querySelector('#profile-menu');

        function closeMenu() {
            profileMenu.classList.remove('is_open');
            profileMenu.setAttribute('aria-hidden', 'true');
            menuButton.setAttribute('aria-expanded', 'false');
        }

        menuButton.addEventListener('click', () => {
            const isOpen = profileMenu.classList.toggle('is_open');
            profileMenu.setAttribute('aria-hidden', String(!isOpen));
            menuButton.setAttribute('aria-expanded', String(isOpen));
        });

        document.addEventListener('click', (event) => {
            const clickedMenu = profileMenu.contains(event.target) || menuButton.contains(event.target);

            if (!clickedMenu) {
                closeMenu();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMenu();
            }
        });

        function initThreeBackground() {
            if (typeof THREE === 'undefined') {
                return;
            }

            const canvas = document.querySelector('#three-background');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
            const renderer = new THREE.WebGLRenderer({
                canvas,
                alpha: true,
                antialias: true
            });
            const pointer = { x: 0, y: 0 };
            const count = 120;
            const positions = new Float32Array(count * 3);

            camera.position.z = 8;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            for (let i = 0; i < count; i++) {
                const index = i * 3;
                positions[index] = (Math.random() - 0.5) * 14;
                positions[index + 1] = (Math.random() - 0.5) * 8;
                positions[index + 2] = (Math.random() - 0.5) * 5;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particles = new THREE.Points(
                geometry,
                new THREE.PointsMaterial({
                    color: 0x8fd3ff,
                    size: 0.028,
                    transparent: true,
                    opacity: 0.58
                })
            );

            const wireGeometry = new THREE.TorusGeometry(2.45, 0.004, 12, 96);
            const wireMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.14
            });
            const ring = new THREE.Mesh(wireGeometry, wireMaterial);

            ring.rotation.x = Math.PI * 0.64;
            scene.add(particles, ring);

            window.addEventListener('pointermove', (event) => {
                pointer.x = (event.clientX / window.innerWidth - 0.5) * 0.22;
                pointer.y = (event.clientY / window.innerHeight - 0.5) * 0.22;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            function animate() {
                particles.rotation.y += 0.0008;
                particles.rotation.x += 0.00035;
                ring.rotation.z += 0.0012;
                scene.rotation.x += (pointer.y - scene.rotation.x) * 0.025;
                scene.rotation.y += (pointer.x - scene.rotation.y) * 0.025;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }

            animate();
        }

        initThreeBackground();
